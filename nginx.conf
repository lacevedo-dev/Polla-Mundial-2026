server {
    listen 3003;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Bloquear acceso a archivos ocultos (ej: .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
