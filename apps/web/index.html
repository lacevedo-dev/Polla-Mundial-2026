<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Polla Mundial 2026</title>
  <meta name="description" content="Pronostica los partidos del Mundial 2026 y compite con tus amigos">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Polla 2026">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/pwa-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/pwa-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/pwa-192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }

    .font-brand {
      font-family: 'Montserrat', sans-serif;
    }

    #app-boot-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #app-boot-splash.app-boot-splash--hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-boot-splash__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 1.5rem;
    }

    .app-boot-splash__logo {
      width: 7.5rem;
      height: 7.5rem;
      object-fit: contain;
    }

    .app-boot-splash__spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid rgba(163, 230, 53, 0.25);
      border-top-color: #a3e635;
      border-radius: 50%;
      animation: app-boot-spin 0.8s linear infinite;
    }

    .app-boot-splash__text {
      margin: 0;
      font-family: 'Montserrat', 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    @keyframes app-boot-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-boot-splash__spinner {
        animation: none;
        border-top-color: #a3e635;
      }

      #app-boot-splash {
        transition: none;
      }
    }
  </style>
  <link rel="stylesheet" href="/index.css">
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
  }
}
</script>
</head>

<body>
  <div id="app-boot-splash" role="status" aria-live="polite" aria-busy="true" aria-label="Cargando Polla 2026">
    <div class="app-boot-splash__content">
      <img src="/icons/pwa-192.png" alt="" width="120" height="120" class="app-boot-splash__logo" decoding="async">
      <div class="app-boot-splash__spinner" aria-hidden="true"></div>
      <p class="app-boot-splash__text">Cargando...</p>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
